[bed_screws]
screw1: 208, 204
screw1_fine_adjust: 190, 170
screw1_name: rear right screw 
screw2: 208, -5
screw2_fine_adjust: 10, 170
screw2_name: rear left screw
screw3: 22, -5
screw3_fine_adjust: 100, 10
screw3_name: front screw
# Use the fine adjusts for verifying probe has contact with the pads
# Youll need to open a console on a new tab and use QUERY_PROBE on each pad
# Before hitting accept, this ensures the calibrate tilt function works.
# Use multi-probe utilties to assist on fine tuning each screw
# Starting with the back right probe pad. set close to zero as possible .225 was davinci recommendation but I try to hit .100 or less...
# Then back left screw to make front right corner match the front left corner
# Then adjust front screw to set front left/right corners to match the back right corner.
# none of the probe pads are perfect, so I have set the probe to average 3 successful attempts in a row within tollerance, with upto 6 retries. 

[screws_tilt_adjust]
screw1: 208, 204 # Probe Point 1
screw1_name: back right screw
screw2: 208, -5 # probe point 2
screw2_name: back left screw
screw3: 22, -5 #probe point 3
screw3_name: front screw
horizontal_move_z: 5.0
speed: 100.0
screw_thread: CW-M3

[bed_tilt]
x_adjust: 0
y_adjust: 0
z_adjust: 0
# The above parameters may be set manually, or automaticlly. 
# can be run by macro per session or saved in the config above to activate at boot.
# The remaining parameters control a BED_TILT_CALIBRATE extended
# g-code command that may be used to calibrate appropriate x and y
# adjustment parameters.
points: 
    208,204
    208,-5
    22,-5
    22,204
speed: 50
horizontal_move_z: 5

# Z 轴相对移动 10mm（向上/向下），用于对齐调试时手动微调。
# 未归零时自动 SET_KINEMATIC_POSITION Z=0（把当前位置当作 Z0），绕过 "Must home axis first"。
# 用法：Z_MOVE_UP 或 Z_MOVE_UP SPEED=2
[gcode_macro Z_MOVE_UP]
gcode:
    {% set speed = params.SPEED|default(5)|float %}
    {% if 'z' not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z=0
    {% endif %}
    SAVE_GCODE_STATE NAME=_z_move_up
    G91
    G1 Z10 F{speed * 60}
    RESTORE_GCODE_STATE NAME=_z_move_up

[gcode_macro Z_MOVE_DOWN]
gcode:
    {% set speed = params.SPEED|default(5)|float %}
    {% if 'z' not in printer.toolhead.homed_axes %}
        SET_KINEMATIC_POSITION Z=0
    {% endif %}
    SAVE_GCODE_STATE NAME=_z_move_down
    G91
    G1 Z-10 F{speed * 60}
    RESTORE_GCODE_STATE NAME=_z_move_down

# 实时监测 X/Y/Z 端点触发状态（非阻塞，0.2s 轮询，仅在变化时报警）。
# 启动：WATCH_ENDSTOPS        停止：WATCH_ENDSTOPS OFF=1
[gcode_macro WATCH_ENDSTOPS]
variable_prev_x: -1
variable_prev_y: -1
variable_prev_z: -1
variable_on: False
gcode:
    {% set off = params.OFF|default(0)|int %}
    {% if off %}
        SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=on VALUE=False
        UPDATE_DELAYED_GCODE ID=endstop_watch DURATION=0
        RESPOND TYPE=echo MSG="endstop watch stopped"
    {% else %}
        SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=on VALUE=True
        SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_x VALUE=-1
        SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_y VALUE=-1
        SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_z VALUE=-1
        UPDATE_DELAYED_GCODE ID=endstop_watch DURATION=0.2
        RESPOND TYPE=echo MSG="endstop watch started (poll 0.2s)"
    {% endif %}

[delayed_gcode endstop_watch]
gcode:
    {% set m = printer['gcode_macro WATCH_ENDSTOPS'] %}
    {% if m.on %}
        {% set q = printer.query_endstops.last_query %}
        {% set cx = 1 if q.x else 0 %}
        {% set cy = 1 if q.y else 0 %}
        {% set cz = 1 if q.z else 0 %}
        {% if cx != m.prev_x or cy != m.prev_y or cz != m.prev_z %}
            {% set sx = 'TRIG' if cx else 'open' %}
            {% set sy = 'TRIG' if cy else 'open' %}
            {% set sz = 'TRIG' if cz else 'open' %}
            RESPOND TYPE=echo MSG="ENDSTOP  X=%s Y=%s Z=%s"|format(sx, sy, sz)
            SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_x VALUE={cx}
            SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_y VALUE={cy}
            SET_GCODE_VARIABLE MACRO=WATCH_ENDSTOPS VARIABLE=prev_z VALUE={cz}
        {% endif %}
        QUERY_ENDSTOPS
        UPDATE_DELAYED_GCODE ID=endstop_watch DURATION=0.2
    {% endif %}

