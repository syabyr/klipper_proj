[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1000
max_z_velocity: 5
max_z_accel: 200

[force_move]
# 启用 SET_KINEMATIC_POSITION / FORCE_MOVE 等低级调试命令（Z 轴对齐时用）
enable_force_move: True

[idle_timeout]
# 空闲 300 秒后所有电机断电，消除挤出机/步进静止斩波啸叫。
# 打印中需移动时自动重新上电。Z 为丝杆，断电后观察是否自锁下落。
timeout: 600

